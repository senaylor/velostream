version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: velostream_db
    restart: always
    environment:
      POSTGRES_USER: velo_admin
      POSTGRES_PASSWORD: velo_secure_pass123
      POSTGRES_DB: velostream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: